name: Lint C++ Sources

on:
  push:
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5

      - name: Check formatting
        run: pixi run fmt-check

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5

      - name: Build and run clang-tidy
        run: pixi run lint-check

  iwyu:
    name: include-what-you-use
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5

      - name: Build and check include hygiene
        run: pixi run iwyu-check
