[workspace]
authors = ["Rajeeva Musunuri <rmusunuri@nygenome.org>"]
channels = ["conda-forge"]
name = "Lancet2"
platforms = ["linux-64"]
version = "2.9.0"

[tasks]

# ── CMake Configure ──────────────────────────────────────────────────────────
# Both presets accept extra CMake flags: pixi run <task> -- -DFLAG=VALUE
configure-release = { cmd = [
  "cmake", "-GNinja",
  "-B", "cmake-build-release",
  "-DCMAKE_BUILD_TYPE=Release",
  "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON",
  "-DLANCET_TESTS=ON",
  "-DLANCET_BUILD_STATIC=ON",
  "-DLANCET_ENABLE_CLOUD_IO=OFF",
], description = "Configure Release build (extra CMake flags via --)" }

configure-debug = { cmd = [
  "cmake", "-GNinja",
  "-B", "cmake-build-debug",
  "-DCMAKE_BUILD_TYPE=Debug",
  "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON",
  "-DLANCET_TESTS=ON",
  "-DLANCET_BUILD_STATIC=ON",
  "-DLANCET_ENABLE_CLOUD_IO=OFF",
], description = "Configure Debug build (tests ON, compile_commands.json)" }

# ── Build ────────────────────────────────────────────────────────────────────
build-release = { cmd = "cmake --build cmake-build-release", depends-on = [
  "configure-release",
], description = "Build Lancet2 in Release mode" }

build-debug = { cmd = "cmake --build cmake-build-debug", depends-on = [
  "configure-debug",
], description = "Build Lancet2 in Debug mode (with tests)" }

# ── Profiling (RelWithDebInfo + gperftools) ──────────────────────────────────
# Dedicated tasks for profiling builds. Uses RelWithDebInfo (same flags as
# Release, plus -g for DWARF debug info) to enable pprof source-line annotation.
# platform_checks.cmake enforces RelWithDebInfo when LANCET_PROFILE_MODE=ON,
# so passing -DCMAKE_BUILD_TYPE explicitly here is redundant but explicit.
configure-profile = { cmd = [
  "cmake", "-GNinja",
  "-B", "cmake-build-profile-release",
  "-DCMAKE_BUILD_TYPE=RelWithDebInfo",
  "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON",
  "-DLANCET_PROFILE_MODE=ON",
  "-DLANCET_BUILD_STATIC=ON",
  "-DLANCET_ENABLE_CLOUD_IO=OFF",
], description = "Configure profiling build (RelWithDebInfo + gperftools)" }

build-profile = { cmd = "cmake --build cmake-build-profile-release", depends-on = [
  "configure-profile",
], description = "Build Lancet2 for profiling (RelWithDebInfo + gperftools)" }

# ── Test & Benchmark ─────────────────────────────────────────────────────────
test = { cmd = "./cmake-build-debug/tests/TestLancet2", depends-on = [
  "build-debug",
], description = "Run Catch2 unit tests" }

bench = { cmd = "./cmake-build-release/benchmarks/BenchmarkLancet2", depends-on = [
  "build-release",
], description = "Run benchmarks (first: pixi run configure-release -- -DLANCET_BENCHMARKS=ON)" }

# ── Fix (apply auto-fixes, then reformat) ────────────────────────────────────
fmt-fix = { cmd = "python3 scripts/run_clang_format.py --fix", description = "Apply clang-format to all C++ sources" }

lint-fix = { cmd = "python3 scripts/run_clang_tidy.py --fix", depends-on = [
  "build-release",
], description = "Run clang-tidy with auto-fix (review changes carefully)" }

iwyu-fix = { cmd = "python3 scripts/run_iwyu.py --fix && python3 scripts/run_clang_format.py --fix", depends-on = [
  "build-release",
], description = "Fix includes via IWYU, then reformat (IWYU → fix_includes → clang-format)" }

# ── Check (CI gate — no modifications, exit 1 on violations) ─────────────────
fmt-check = { cmd = "python3 scripts/run_clang_format.py", description = "Check C++ formatting (dry-run, fails on diff)" }

lint-check = { cmd = "python3 scripts/run_clang_tidy.py", depends-on = [
  "build-release",
], description = "Run clang-tidy on all sources (no fixes, fails on warnings)" }

iwyu-check = { cmd = "python3 scripts/run_iwyu.py", depends-on = [
  "build-release",
], description = "Check include hygiene with IWYU (no fixes, fails on violations)" }

lint-all = { depends-on = [
  "fmt-check",
  "lint-check",
  "iwyu-check",
], description = "Run all checks (clang-format + clang-tidy + IWYU)" }

# ── Documentation ────────────────────────────────────────────────────────────
docs-serve = { cmd = "mkdocs serve", description = "Serve docs locally at http://127.0.0.1:8000" }

docs-build = { cmd = "mkdocs build --strict", description = "Build docs with strict validation (zero-warning)" }

docs-export = { cmd = "python3 scripts/export_docs.py -o Lancet2_Docs.md", description = "Export all docs into a single Markdown file" }

# ── Release & Deployment ─────────────────────────────────────────────────────
update-changelog = { cmd = "bash scripts/update_changelog.sh", depends-on = [
  "ensure-git-chglog",
], description = "Update CHANGELOG.md via git-chglog" }

# ── Go Binary Management (all Go tools installed into $CONDA_PREFIX/bin) ──────
ensure-git-chglog = { cmd = "GOBIN=$CONDA_PREFIX/bin go install github.com/git-chglog/git-chglog/cmd/git-chglog@latest", description = "Install/update git-chglog into the workspace" }

# NOTE: ensure-pprof and analyze-profile tasks live in the profiling environment.
# Use: pixi run -e profiling analyze-profile <profile.bin>
# See [feature.profiling.tasks] at the bottom of this file.

[tasks.version-bump]
cmd = "python3 scripts/bump_version.py {{ kind }} && bash scripts/update_changelog.sh"
args = [{ arg = "kind", default = "patch", choices = ["major", "minor", "patch"] }]
description = "Bump version (major|minor|patch), update changelog, and push"

[tasks.conda-build-local]
cmd = "bash scripts/build_conda_local.sh"
description = "Build a local conda package via rattler-build"

[tasks.docker-push]
cmd = "bash scripts/build_push_image.sh"
description = "Build and push Docker image to GCR (requires gcloud auth)"

[dependencies]
git = "==2.53.0"
make = "==4.4.1"
cmake = "==4.3.1"
ninja = "==1.13.2"
bzip2 = "==1.0.8"
liblzma = "==5.8.3"
liblzma-devel = "==5.8.3"
liblzma-static = "==5.8.3"
libcurl = "==8.19.0"
openssl = "==3.6.2"
gcc = "==15.2.0"
gxx = "==15.2.0"
libstdcxx = "==15.2.0"
clang = "==22.1.3"
clangxx = "==22.1.3"
libcxx = "==22.1.3"
gdb = "==17.1"
clang-tools = "==22.1.3"
include-what-you-use = "==0.26"
go = "==1.26.2"
graphviz = "==14.1.2"

[pypi-dependencies]
mkdocs = "==1.6.1"
mike = "==2.2.0"
mkdocs-material = "==9.7.6"
mkdocs-minify-plugin = "==0.8.0"
mkdocs-git-revision-date-localized-plugin = "==1.5.1"

# ═══════════════════════════════════════════════════════════════════════════════
# Feature: profiling — isolated Python deps for CPU profile analysis
#
# All profiling tasks require the -e profiling flag:
#   pixi run -e profiling analyze-profile path/to/profile.bin                         (all views)
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view overview
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view top --top 50
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view modules
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view components
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view lines
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view tree
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view tree --focus "lancet::caller"
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --view hotpaths
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --html report.html    (static HTML)
#   pixi run -e profiling analyze-profile path/to/profile.bin -- --list "BuildGraph"   (source)
#
# Same-binary diff (both profiles collected from the same binary):
#   pixi run -e profiling analyze-profile new.bin -- --diff-base old.bin               (same-binary diff)
#   pixi run -e profiling analyze-profile new.bin -- --diff-base old.bin --html d.html (diff HTML)
#
# Cross-binary diff (profiles from different binaries — the primary optimization workflow):
#   pixi run -e profiling analyze-profile old.bin -- --binary old_binary --save-summary before   (save)
#   pixi run -e profiling analyze-profile new.bin -- --binary new_binary --save-summary after    (save)
#   pixi run -e profiling analyze-profile -- --diff-tag before after                             (diff)
#
# History:
#   pixi run -e profiling analyze-profile -- --history                                 (trends)
# ═══════════════════════════════════════════════════════════════════════════════

[feature.profiling.pypi-dependencies]
rich = "==15.0.0"
jinja2 = "==3.1.6"

[feature.profiling.tasks.ensure-pprof]
cmd = "GOBIN=$CONDA_PREFIX/bin go install github.com/google/pprof@latest"
description = "Install/update pprof into the profiling workspace"

[feature.profiling.tasks.analyze-profile]
cmd = "python3 scripts/analyze_profile.py {{ profile }}"
args = [{ arg = "profile", default = "" }]
depends-on = ["ensure-pprof"]
description = "Analyze a gperftools CPU profile (use -- for additional flags)"

[environments]
profiling = { features = ["profiling"], solve-group = "default" }
