[workspace]
authors = ["Rajeeva Musunuri <rmusunuri@nygenome.org>"]
channels = ["conda-forge"]
name = "Lancet2"
platforms = ["linux-64"]
version = "2.9.0"

[tasks]

# ── CMake Configure ──────────────────────────────────────────────────────────
# Both presets accept extra CMake flags: pixi run <task> -- -DFLAG=VALUE
configure = { cmd = [
  "cmake", "-GNinja",
  "-B", "cmake-build-release",
  "-DCMAKE_BUILD_TYPE=Release",
  "-DLANCET_BUILD_STATIC=ON",
  "-DLANCET_ENABLE_CLOUD_IO=OFF",
], description = "Configure Release build (extra CMake flags via --)" }

configure-debug = { cmd = [
  "cmake", "-GNinja",
  "-B", "build",
  "-DCMAKE_BUILD_TYPE=Debug",
  "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON",
  "-DLANCET_TESTS=ON",
  "-DLANCET_BUILD_STATIC=ON",
  "-DLANCET_ENABLE_CLOUD_IO=OFF",
], description = "Configure Debug build (tests ON, compile_commands.json)" }

# ── Build ────────────────────────────────────────────────────────────────────
build = { cmd = "cmake --build cmake-build-release", depends-on = [
  "configure",
], description = "Build Lancet2 in Release mode" }

build-debug = { cmd = "cmake --build build", depends-on = [
  "configure-debug",
], description = "Build Lancet2 in Debug mode (with tests)" }

# ── Test & Benchmark ─────────────────────────────────────────────────────────
test = { cmd = "./build/tests/TestLancet2", depends-on = [
  "build-debug",
], description = "Run Catch2 unit tests" }

bench = { cmd = "./cmake-build-release/benchmarks/BenchmarkLancet2", depends-on = [
  "build",
], description = "Run benchmarks in Release mode (first: pixi run configure -- -DLANCET_BENCHMARKS=ON)" }

# ── Formatting (clang-format) ────────────────────────────────────────────────
fmt-check = { cmd = "python3 scripts/run_clang_format.py", description = "Check C++ formatting (dry-run)" }

fmt = { cmd = "python3 scripts/run_clang_format.py --fix", description = "Apply clang-format to all C++ sources" }

# ── Static Analysis (clang-tidy) ─────────────────────────────────────────────
lint-check = { cmd = "python3 scripts/run_clang_tidy.py", depends-on = [
  "build-debug",
], description = "Run clang-tidy check on all sources (no fixes)" }

lint-fix = { cmd = "python3 scripts/run_clang_tidy.py --fix", depends-on = [
  "build-debug",
], description = "Run clang-tidy with auto-fix (review changes carefully)" }

# ── Aggregate Lint ───────────────────────────────────────────────────────────
lint-all = { depends-on = [
  "fmt-check",
  "lint-check",
], description = "Run all linting checks (formatting + static analysis)" }

# ── Documentation ────────────────────────────────────────────────────────────
docs-serve = { cmd = "mkdocs serve", description = "Serve docs locally at http://127.0.0.1:8000" }

docs-build = { cmd = "mkdocs build --strict", description = "Build docs with strict validation (zero-warning)" }

docs-export = { cmd = "python3 scripts/export_docs.py -o Lancet2_Docs.md", description = "Export all docs into a single Markdown file" }

# ── Release & Deployment ─────────────────────────────────────────────────────
update-changelog = { cmd = "bash scripts/update_changelog.sh", description = "Update CHANGELOG.md via git-chglog (requires Go toolchain)" }

[tasks.version-bump]
cmd = "python3 scripts/bump_version.py {{ kind }} && bash scripts/update_changelog.sh"
args = [{ arg = "kind", default = "patch", choices = ["major", "minor", "patch"] }]
description = "Bump version (major|minor|patch), update changelog, and push"

[tasks.conda-build-local]
cmd = "bash scripts/build_conda_local.sh"
description = "Build a local conda package via rattler-build"

[tasks.docker-push]
cmd = "bash scripts/build_push_image.sh"
description = "Build and push Docker image to GCR (requires gcloud auth)"


[dependencies]
clang-tools = "==22.1.3"
git = "==2.53.0"
make = "==4.4.1"
cmake = "==4.3.1"
ninja = "==1.13.2"
bzip2 = "==1.0.8"
liblzma = "==5.8.3"
liblzma-devel = "==5.8.3"
liblzma-static = "==5.8.3"
libcurl = "==8.19.0"
openssl = "==3.6.2"
gcc = "==15.2.0"
clang = "==22.1.3"
gxx = "==15.2.0"
clangxx = "==22.1.3"
libstdcxx = "==15.2.0"
libcxx = "==22.1.3"
mkdocs = "==1.6.1"
gdb = "==17.1"

[pypi-dependencies]
mkdocs-material = "==9.7.6"
mike = "==2.1.4"
mkdocs-minify-plugin = "==0.8.0"
mkdocs-git-revision-date-localized-plugin = "==1.5.1"
